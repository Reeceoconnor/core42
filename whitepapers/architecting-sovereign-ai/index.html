<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<base href="/core42/project/" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whitepaper — Core42</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--c42-paper); font-family: var(--font-sans); min-height: 100vh; }
  /* Keep the fixed-width desktop artboards centered when they're narrower than viewport */
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="site-nav.jsx"></script>
<script type="text/babel" src="BlogPage.jsx"></script>
<script type="text/babel" src="DirectoryPage.jsx"></script>
<script type="text/babel" src="templates/BlogArticlePage.jsx"></script>
<script type="text/babel" src="templates/WhitepaperDetailPage.jsx"></script>
<script type="text/babel" src="templates/WebinarUpcomingPage.jsx"></script>
<script type="text/babel" src="templates/WebinarOnDemandPage.jsx"></script>
<script type="text/babel" src="templates/CaseStudyDetailPage.jsx"></script>
<script type="text/babel" src="MobileDirectoryPage.jsx"></script>
<script type="text/babel" src="templates/MobileTemplates.jsx"></script>

<script type="text/babel">
function Page() {
  const isMobile = useIsMobile();
  return (
    <>
      {!isMobile && <SiteHeader active="resources" />}
      <ResponsivePage Desktop={WhitepaperDetailPage} Mobile={MobileWhitepaperDetailPage} />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
